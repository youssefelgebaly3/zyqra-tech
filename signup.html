<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>إنشاء حساب - ZYQRA</title>

    <link href="assets/img/favicon.png" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link href="assets/vendor/bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="assets/js/translations/common.js"></script>
    <script src="assets/js/translations/auth.js"></script>
    <script src="assets/js/lang-config.js?v=3.1"></script>
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css?v=3.1" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-logo">
                <a href="index.html" class="logo">ZYQRA</a>
            </div>

            <div class="auth-title">
                <h2 data-i18n="auth_signup_title">إنشاء حساب جديد</h2>
                <p data-i18n="auth_signup_subtitle">انضم إلى مجتمع ZYQRA</p>
            </div>

            <form action="#" method="post">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="firstname" placeholder="الاسم الأول" required data-i18n="auth_fname_ph">
                            <label for="firstname" data-i18n="auth_fname_label">الاسم الأول</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="lastname" placeholder="الاسم الأخير" required data-i18n="auth_lname_ph">
                            <label for="lastname" data-i18n="auth_lname_label">الاسم الأخير</label>
                        </div>
                    </div>
                </div>

                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="البريد الإلكتروني" required data-i18n="auth_email_ph">
                    <label for="email"><i class="bi bi-envelope me-2"></i> <span data-i18n="auth_email_label">البريد الإلكتروني</span></label>
                </div>

                <div class="form-floating">
                    <input type="tel" class="form-control" id="phone" placeholder="رقم الهاتف" data-i18n="auth_phone_ph">
                    <label for="phone"><i class="bi bi-phone me-2"></i> <span data-i18n="auth_phone_label">رقم الهاتف (اختياري)</span></label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="كلمة المرور" required data-i18n="auth_pass_ph">
                    <label for="password"><i class="bi bi-lock me-2"></i> <span data-i18n="auth_pass_label">كلمة المرور</span></label>
                </div>

                <div class="password-strength">
                    <div class="password-strength-bar"></div>
                </div>


                <div class="form-floating">
                    <input type="password" class="form-control" id="confirm-password" placeholder="تأكيد كلمة المرور"
                        required data-i18n="auth_confirm_pass_ph">
                    <label for="confirm-password"><i class="bi bi-lock-fill me-2"></i> <span data-i18n="auth_confirm_pass_label">تأكيد كلمة المرور</span></label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label" for="terms">
                        <span data-i18n="auth_terms_prefix">أوافق على</span> <a href="terms.html" data-i18n="auth_terms_link">الشروط والأحكام</a> <span data-i18n="auth_terms_and">و</span> <a href="privacy.html" data-i18n="auth_privacy_link">سياسة الخصوصية</a>
                    </label>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="bi bi-person-plus me-2"></i> <span data-i18n="auth_signup_btn">إنشاء الحساب</span>
                </button>
            </form>

            <div class="auth-divider">
                <span data-i18n="auth_or">أو</span>
            </div>

            <div class="social-login">
                <a href="#" class="social-btn">
                    <i class="bi bi-google"></i> Google
                </a>
                <a href="#" class="social-btn">
                    <i class="bi bi-facebook"></i> Facebook
                </a>
            </div>

            <div class="auth-footer">
                <span data-i18n="auth_has_account">لديك حساب بالفعل؟</span> <a href="signin.html" data-i18n="auth_signin_link">سجل دخولك</a>
            </div>

            <div class="text-center mt-4">
                <a href="index.html" style="color: #6c757d; text-decoration: none;">
                    <i class="bi bi-arrow-right me-1"></i> <span data-i18n="auth_back_home">العودة للرئيسية</span>
                </a>
            </div>

        </div>
    </div>

    <script src="assets/js/main.js?v=3.1"></script>

</body>

</html>
