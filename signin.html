<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>تسجيل الدخول - ZYQRA</title>

    <link href="assets/img/favicon.png" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link href="assets/vendor/bootstrap/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="assets/js/translations/common.js"></script>
    <script src="assets/js/translations/auth.js"></script>
    <script src="assets/js/lang-config.js?v=3.1"></script>
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/main.css?v=3.1" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-logo">
                <a href="index.html" class="logo">ZYQRA</a>
            </div>

            <div class="auth-title">
                <h2 data-i18n="auth_signin_title">مرحباً بعودتك</h2>
                <p data-i18n="auth_signin_subtitle">سجل دخولك للمتابعة</p>
            </div>

            <form action="#" method="post">
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="البريد الإلكتروني" required data-i18n="auth_email_ph">
                    <label for="email"><i class="bi bi-envelope me-2"></i> <span data-i18n="auth_email_label">البريد الإلكتروني</span></label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="كلمة المرور" required data-i18n="auth_pass_ph">
                    <label for="password"><i class="bi bi-lock me-2"></i> <span data-i18n="auth_pass_label">كلمة المرور</span></label>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember" data-i18n="auth_remember">تذكرني</label>
                    </div>
                    <div class="forgot-link">
                        <a href="#" data-i18n="auth_forgot">نسيت كلمة المرور؟</a>
                    </div>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="bi bi-box-arrow-in-left me-2"></i> <span data-i18n="auth_signin_btn">تسجيل الدخول</span>
                </button>
            </form>

            <div class="auth-divider">
                <span data-i18n="auth_or">أو</span>
            </div>

            <div class="social-login">
                <a href="#" class="social-btn">
                    <i class="bi bi-google"></i> Google
                </a>
                <a href="#" class="social-btn">
                    <i class="bi bi-facebook"></i> Facebook
                </a>
            </div>

            <div class="auth-footer">
                <span data-i18n="auth_no_account">ليس لديك حساب؟</span> <a href="signup.html" data-i18n="auth_signup_link">سجل الآن</a>
            </div>

            <div class="text-center mt-4">
                <a href="index.html" style="color: #6c757d; text-decoration: none;">
                    <i class="bi bi-arrow-right me-1"></i> <span data-i18n="auth_back_home">العودة للرئيسية</span>
                </a>
            </div>

        </div>
    </div>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js?v=4.5"></script>
    <script src="assets/js/pages/signin.js"></script>
</body>

</html>
