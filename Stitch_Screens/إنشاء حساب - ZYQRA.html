<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>إنشاء حساب - ZYQRA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Tajawal", "Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 font-display">
<div class="max-w-[520px] w-full bg-white dark:bg-slate-900 shadow-2xl rounded-xl overflow-hidden border border-primary/10">
<!-- Logo and Header Section -->
<div class="p-8 text-center pb-0">
<div class="flex items-center justify-center gap-2 mb-6 text-primary dark:text-slate-100">
<div class="size-10 bg-primary flex items-center justify-center rounded-lg text-white">
<span class="material-symbols-outlined text-3xl">hub</span>
</div>
<h1 class="text-2xl font-bold tracking-tight">ZYQRA</h1>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">إنشاء حساب جديد</h2>
<p class="text-slate-500 dark:text-slate-400">انضم إلى مجتمع ZYQRA اليوم وابدأ رحلتك</p>
</div>
<form class="p-8 space-y-5">
<!-- Name Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">الاسم الأول</label>
<input class="w-full h-12 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="أدخل الاسم الأول" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">الاسم الأخير</label>
<input class="w-full h-12 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="أدخل الاسم الأخير" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">البريد الإلكتروني</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full h-12 pr-4 pl-12 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="example@domain.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 flex justify-between">
                    رقم الهاتف
                    <span class="text-xs text-slate-400 font-normal">(اختياري)</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">call</span>
<input class="w-full h-12 pr-4 pl-12 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="05xxxxxxxx" type="tel"/>
</div>
</div>
<!-- Passwords -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">كلمة المرور</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full h-12 pr-4 pl-12 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">تأكيد كلمة المرور</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full h-12 pr-4 pl-12 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 size-4 rounded border-slate-300 text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed" for="terms">
                    أوافق على <a class="text-primary font-bold hover:underline" href="#">الشروط والأحكام</a> و <a class="text-primary font-bold hover:underline" href="#">سياسة الخصوصية</a>.
                </label>
</div>
<!-- Submit -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-12 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20" type="submit">
                إنشاء الحساب
                <span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<!-- Divider -->
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 text-sm">أو</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-medium text-slate-700 dark:text-slate-300" type="button">
<svg class="size-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-medium text-slate-700 dark:text-slate-300" type="button">
<svg class="size-5 text-[#1877F2]" fill="currentColor" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
                    Facebook
                </button>
</div>
<!-- Footer Links -->
<div class="text-center space-y-4 pt-4">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    لديك حساب بالفعل؟ 
                    <a class="text-primary font-bold hover:underline" href="#">سجل دخولك</a>
</p>
<a class="inline-flex items-center gap-1 text-slate-400 hover:text-primary transition-colors text-sm" href="#">
<span class="material-symbols-outlined text-base">home</span>
                    العودة للرئيسية
                </a>
</div>
</form>
</div>
<div class="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-primary/0 via-primary to-primary/0"></div>
</body></html>
